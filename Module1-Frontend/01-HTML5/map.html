<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Nearby Events | Community Event Portal</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f4f6; color: #1f2937; margin: 0; line-height: 1.6; }
    header { background: #0b3d91; color: #fff; padding: 16px 24px; }
    header a { color: #ffd966; }
    main { max-width: 560px; margin: 24px auto; padding: 0 20px; }
    h1 { margin: 0; font-size: 1.5rem; }
    .card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    button { padding: 12px 18px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; background: #0b3d91; color: #fff; }
    button:hover { background: #08306b; }
    #geoResult { margin-top: 16px; padding: 12px; border-radius: 6px; background: #e2e8f0; }
    .error { background: #f8d7da; color: #842029; }
    .ok { background: #d1e7dd; color: #0f5132; }
  </style>
</head>
<body>
  <header>
    <h1>Find Nearby Events</h1>
    <p style="margin:4px 0 0;"><a href="index.html">&larr; Back to Home</a></p>
  </header>

  <main>
    <!-- Exercise 9: Geolocation for Event Mapping -->
    <div class="card">
      <p>Click the button to detect your location and find the closest community events.</p>
      <button type="button" onclick="findEvents()">Find Nearby Events</button>
      <div id="geoResult">Your location has not been requested yet.</div>
    </div>
  </main>

  <script>
    function findEvents() {
      const out = document.getElementById('geoResult');

      if (!('geolocation' in navigator)) {
        out.textContent = 'Geolocation is not supported by your browser.';
        out.className = 'error';
        return;
      }

      out.textContent = 'Locating you…';
      out.className = '';

      // High accuracy options with a timeout
      const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 };

      navigator.geolocation.getCurrentPosition(onSuccess, onError, options);
    }

    function onSuccess(position) {
      const { latitude, longitude, accuracy } = position.coords;
      const out = document.getElementById('geoResult');
      out.className = 'ok';
      out.innerHTML =
        'Location found!<br>' +
        'Latitude: ' + latitude.toFixed(5) + '<br>' +
        'Longitude: ' + longitude.toFixed(5) + '<br>' +
        'Accuracy: ±' + Math.round(accuracy) + ' m<br>' +
        '<a href="https://www.openstreetmap.org/?mlat=' + latitude + '&mlon=' + longitude +
        '#map=15/' + latitude + '/' + longitude + '" target="_blank" rel="noopener">View on map</a>';
    }

    function onError(error) {
      const out = document.getElementById('geoResult');
      out.className = 'error';
      switch (error.code) {
        case error.PERMISSION_DENIED:
          out.textContent = 'Permission denied. Please allow location access to find nearby events.';
          break;
        case error.POSITION_UNAVAILABLE:
          out.textContent = 'Location information is unavailable.';
          break;
        case error.TIMEOUT:
          out.textContent = 'The request timed out. Please try again.';
          break;
        default:
          out.textContent = 'An unknown error occurred: ' + error.message;
      }
    }
  </script>
</body>
</html>
