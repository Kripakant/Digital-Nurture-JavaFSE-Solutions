<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Registration | Community Event Portal</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f3f4f6; color: #1f2937; margin: 0; line-height: 1.6; }
    header { background: #0b3d91; color: #fff; padding: 16px 24px; }
    header a { color: #ffd966; }
    main { max-width: 600px; margin: 24px auto; padding: 0 20px; }
    h1 { margin: 0; font-size: 1.5rem; }
    /* Exercise 5: Form styling */
    form {
      background: #fff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .field { margin-bottom: 16px; }
    label { display: block; font-weight: bold; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 1rem;
    }
    textarea { resize: vertical; min-height: 90px; }
    button {
      background: #0b3d91;
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #08306b; }
    output {
      display: block;
      margin-top: 16px;
      padding: 12px;
      background: #d1e7dd;
      color: #0f5132;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Event Registration</h1>
    <p style="margin:4px 0 0;"><a href="index.html">&larr; Back to Home</a></p>
  </header>

  <main>
    <!-- Exercise 5: Event Registration Form -->
    <p>Fill in the details below to reserve your spot at a community event.</p>
    <form id="registrationForm" onsubmit="return handleRegister(event)">
      <div class="field">
        <label for="name">Full Name</label>
        <!-- autofocus on the first field -->
        <input type="text" id="name" name="name" placeholder="e.g. Jane Doe" required autofocus />
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="field">
        <label for="date">Preferred Event Date</label>
        <input type="date" id="date" name="date" required />
      </div>

      <div class="field">
        <label for="eventType">Event Type</label>
        <select id="eventType" name="eventType" required>
          <option value="">-- Select an event --</option>
          <option value="Music Festival">Music Festival</option>
          <option value="Clean-Up Day">Community Clean-Up Day</option>
          <option value="Farmers Market">Farmers Market</option>
          <option value="Art Workshop">Kids Art Workshop</option>
          <option value="Fun Run">Charity Fun Run</option>
        </select>
      </div>

      <div class="field">
        <label for="message">Message (optional)</label>
        <textarea id="message" name="message" placeholder="Any special requirements or questions?"></textarea>
      </div>

      <button type="submit">Register</button>

      <!-- Confirmation message shown via <output> on submit -->
      <output id="confirmation" aria-live="polite"></output>
    </form>
  </main>

  <script>
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const type = document.getElementById('eventType').value;
      const date = document.getElementById('date').value;
      const out = document.getElementById('confirmation');
      out.textContent =
        `Thank you, ${name}! You're registered for the "${type}" on ${date}. A confirmation email is on its way.`;
      return false; // prevent actual navigation for this demo
    }
  </script>
</body>
</html>
