<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preferences | Community Event Portal</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f3f4f6; color: #1f2937; margin: 0; line-height: 1.6; }
    header { background: #0b3d91; color: #fff; padding: 16px 24px; }
    header a { color: #ffd966; }
    main { max-width: 560px; margin: 24px auto; padding: 0 20px; }
    h1 { margin: 0; font-size: 1.5rem; }
    .card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    label { display: block; font-weight: bold; margin-bottom: 6px; }
    select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; }
    button { padding: 10px 16px; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 14px; }
    .save { background: #0b3d91; color: #fff; }
    .clear { background: #b00020; color: #fff; margin-left: 8px; }
    #status { margin-top: 14px; padding: 10px; border-radius: 6px; background: #e2e8f0; }
  </style>
</head>
<body>
  <header>
    <h1>Your Preferences</h1>
    <p style="margin:4px 0 0;"><a href="index.html">&larr; Back to Home</a></p>
  </header>

  <main>
    <!-- Exercise 8: Saving User Preferences (localStorage / sessionStorage) -->
    <div class="card">
      <p>Choose your preferred event type. We'll remember it for your next visit.</p>

      <label for="prefEvent">Preferred Event Type</label>
      <select id="prefEvent" onchange="savePreference()">
        <option value="">-- Select --</option>
        <option value="Music Festival">Music Festival</option>
        <option value="Clean-Up Day">Community Clean-Up Day</option>
        <option value="Farmers Market">Farmers Market</option>
        <option value="Art Workshop">Kids Art Workshop</option>
        <option value="Fun Run">Charity Fun Run</option>
      </select>

      <div>
        <button class="save" type="button" onclick="savePreference()">Save Preference</button>
        <button class="clear" type="button" onclick="clearPreferences()">Clear Preferences</button>
      </div>

      <div id="status">No preference loaded yet.</div>
    </div>
  </main>

  <script>
    const KEY = 'preferredEventType';

    // Save selected event type in localStorage (and record the visit in sessionStorage)
    function savePreference() {
      const value = document.getElementById('prefEvent').value;
      if (value) {
        localStorage.setItem(KEY, value);
        sessionStorage.setItem('lastSavedAt', new Date().toLocaleTimeString());
        document.getElementById('status').textContent =
          'Saved! Preferred event type: ' + value + ' (at ' + sessionStorage.getItem('lastSavedAt') + ')';
      }
    }

    // On reload, retrieve and pre-select the stored preference
    function loadPreference() {
      const saved = localStorage.getItem(KEY);
      if (saved) {
        document.getElementById('prefEvent').value = saved;
        document.getElementById('status').textContent = 'Loaded saved preference: ' + saved;
      }
    }

    // Clear both localStorage and sessionStorage
    function clearPreferences() {
      localStorage.clear();
      sessionStorage.clear();
      document.getElementById('prefEvent').value = '';
      document.getElementById('status').textContent = 'Preferences cleared from local and session storage.';
    }

    window.addEventListener('load', loadPreference);
  </script>
</body>
</html>
